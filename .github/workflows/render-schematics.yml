name: Render Schematics

on:
  push:
    paths:
      - 'engineering/**/schematics/*.py'
      - 'tools/render_schematics.py'
      - 'tools/requirements.txt'

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r tools/requirements.txt

      - name: Render all schematics
        run: python tools/render_schematics.py

      - name: Commit rendered SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add engineering/**/schematics/*.svg
          git diff --cached --quiet || git commit -m "Auto-render schematic SVGs"
          git push
